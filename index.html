<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>
  <div class="bg-shape shape-3"></div>

  <div class="container">
    <header class="topo">
  <div class="brand-box">
    <img src="./asstets/logo.png" alt="TaskFlow Logo" class="logo-img" />

    <div>
      <h1><span class="task">Task</span><span class="flow">Flow</span></h1>
      <p class="subtitle">Gerenciador de tarefas moderno e organizado</p>
    </div>
  </div>
</header>

    <section class="form-section card">
      <div class="section-title">
        <span class="section-tag">Nova tarefa</span>
        <h2>Cadastrar tarefa</h2>
      </div>

      <form id="tarefaForm" class="formulario">
        <div class="input-group">
          <label for="titulo">Título</label>
          <input type="text" id="titulo" placeholder="Digite o título da tarefa" required />
        </div>

        <div class="input-group">
          <label for="descricao">Descrição</label>
          <textarea id="descricao" placeholder="Descreva a tarefa" required></textarea>
        </div>

        <div class="form-grid-2">
          <div class="input-group">
            <label for="status">Status</label>
            <select id="status" required>
              <option value="">Selecione o status</option>
              <option value="PENDENTE">PENDENTE</option>
              <option value="EM_ANDAMENTO">EM_ANDAMENTO</option>
              <option value="CONCLUIDA">CONCLUIDA</option>
            </select>
          </div>

          <div class="input-group">
            <label for="prioridade">Prioridade</label>
            <select id="prioridade" required>
              <option value="">Selecione a prioridade</option>
              <option value="BAIXA">BAIXA</option>
              <option value="MEDIA">MEDIA</option>
              <option value="ALTA">ALTA</option>
            </select>
          </div>
        </div>

        <button type="submit" class="btn-principal">Cadastrar tarefa</button>
      </form>
    </section>

    <section class="lista-section card">
      <div class="lista-header">
        <div class="section-title">
          <span class="section-tag">Painel</span>
          <h2>Lista de tarefas</h2>
        </div>

        <button id="atualizarBtn" class="btn-secundario">Atualizar lista</button>
      </div>

      <div id="listaTarefas" class="lista-tarefas"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
